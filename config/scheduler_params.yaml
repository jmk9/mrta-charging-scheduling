##
## Scheduler robot configuration
##
## Exactly ONE of the blocks below should be active at a time.
## Comment out (#) all other blocks so rclcpp only sees a single `scheduler` node config.
##
## Example:
##  - If you want 4 robots, keep only the "4 robots" block active.
##  - If you want 10 robots, comment out the 4-robot block and uncomment the "10 robots" block.


########################
## 3 robots ##
########################

# scheduler:
#   ros__parameters:
#     robot_ids:
#       - tb1
#       - tb2
#       - tb3

#     robot_cap_wh: |
#       tb1: 40.0
#       tb2: 60.0
#       tb3: 40.0


########################
## 4 robots ##
########################

scheduler:
  ros__parameters:
    robot_ids:
      - tb1
      - tb2
      - tb3
      - tb4

    robot_cap_wh: |
      tb1: 40.0
      tb2: 60.0
      tb3: 40.0
      tb4: 60.0


